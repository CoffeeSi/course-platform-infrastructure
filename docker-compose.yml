services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-app_db} -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.8-alpine3.23
    restart: always
    environment:
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - ${REDIS_PORT}:6379

  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SERVER_URL: ${MINIO_ENDPOINT:-http://minio:9000}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-create-buckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio ${MINIO_ENDPOINT:-http://minio:9000} minioadmin minioadmin; do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb myminio/course-videos || true;
      exit 0;
      "

  backend:
    build: ./backend
    restart: always
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DJANGO_FRONTEND_URL: ${DJANGO_FRONTEND_URL:-localhost}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_PORT: ${REDIS_PORT:-6379}
      CELERY_BROKER_URL: redis://redis:${REDIS_PORT:-6379}/0
      CELERY_RESULT_BACKEND: redis://redis:${REDIS_PORT:-6379}/0
      CELERY_ACCEPT_CONTENT: ${CELERY_ACCEPT_CONTENT:-json}
      CELERY_TASK_SERIALIZER: ${CELERY_TASK_SERIALIZER:-json}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-someemail@gmail.com}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-your_email_password}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Course Platform <someemail@gmail.com>}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      USE_MINIO: ${USE_MINIO:-True}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_ENDPOINT_URL: ${MINIO_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-course-videos}
      MINIO_STORAGE_USE_SSL: ${MINIO_STORAGE_USE_SSL:-False}
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - django_static:/app/staticfiles

  celery_worker:
    build: ./backend
    command: celery -A config worker -l info -P solo
    restart: always
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONPATH=./backend
    depends_on:
      - redis
      - backend

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli
    command: >
      listen 
      --api-key ${STRIPE_SECRET_KEY} 
      --forward-to http://backend:8000/api/v1/payments/webhooks/stripe/
    depends_on:
      - backend
    restart: unless-stopped

  # frontend:
  #   build: ./frontend
  #   restart: always
  #   environment:
  #     NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
  #     BACKEND_URL: ${BACKEND_URL:-http://nginx}
  #   depends_on:
  #     - backend

  
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./src:/usr/share/nginx/html
      - django_static:/var/www/django/static:ro
    depends_on:
      - backend
      # - frontend


volumes:
  postgres_data:
  minio_data:
  django_static:
