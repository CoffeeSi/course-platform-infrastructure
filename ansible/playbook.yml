- name: Infrastructure Setup for Course Platform
  hosts: all
  become: true
  gather_facts: false
  pre_tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        timeout: 900
        delay: 10
        sleep: 10
  tasks:
    - name: Gather facts after the host is reachable
      setup:

    - name: Update apt cache and install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - python3-pip
        state: present
        update_cache: yes

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository to apt sources
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
        state: present
        filename: docker

    - name: Install Docker Engine components
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Stop any running Docker Compose services
      shell: docker compose down 2>/dev/null || true
      args:
        chdir: "/opt/course-platform"
      changed_when: false
      failed_when: false

    - name: Clean up Docker resources
      shell: docker system prune -af --volumes 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: Clone repository and deploy stack
      git:
        repo: 'https://github.com/CoffeeSi/course-platform-infrastructure.git'
        dest: /opt/course-platform
        force: yes

    - name: Copy .env file
      copy:
        src: .env
        dest: /opt/course-platform/.env
        mode: '0600'

    - name: Tear down existing Docker Compose services
      command: docker compose down
      args:
        chdir: "/opt/course-platform"
      ignore_errors: yes
      changed_when: false

    - name: Clean up unused Docker resources (prune)
      command: docker system prune -af --volumes
      ignore_errors: yes
      changed_when: false

    - name: Build and start Docker Compose services
      command: docker compose up -d --build
      args:
        chdir: "/opt/course-platform"
    
    - name: Wait for services to initialize
      pause:
        seconds: 15

    - name: Display running containers
      command: docker compose ps
      args:
        chdir: "/opt/course-platform"
      register: docker_ps_output
      changed_when: false

    - name: Print containers status
      debug:
        msg: "{{ docker_ps_output.stdout_lines }}"